// ── Color palettes ──────────────────────────────────────────
const COMM_COLORS = [
  '#58a6ff','#3fb950','#f78166','#d2a8ff','#ffa657',
  '#79c0ff','#56d364','#ff7b72','#bc8cff','#ffb77a',
  '#a5d6ff','#85e89d','#ffab9b','#dab6ff','#ffd09b',
  '#cae8ff','#b1f0b5','#ffc7bf','#eedeff','#ffe2b5',
];
const REL_COLORS = {
  imports: '#58a6ff', contains: '#3fb950', calls: '#f78166',
  defines: '#d2a8ff', method: '#d2a8ff', inherits: '#ffa657',
  rationale_for: '#8b949e',
};
function relColor(r) { return REL_COLORS[r] || '#484f58'; }
function commColor(c) { return COMM_COLORS[c % COMM_COLORS.length]; }

// ── State ───────────────────────────────────────────────────
let nodes = [], links = [], nodeMap = {};
let hiddenCommunities = new Set();
let hiddenRelations = new Set();
let searchTerm = '';
let showLabels = true;
let selectedNode = null;
let highlightSet = null; // set of node ids to highlight

// Physics
let positions = {};
let velocities = {};
let simRunning = true;
let simStep = 0;

// Viewport
let viewX = 0, viewY = 0, viewScale = 1;
let dragging = false, dragStartX, dragStartY, dragViewX, dragViewY;
let hoveredNode = null;

const canvas = document.getElementById('graph-canvas');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');

// ── Build graph ─────────────────────────────────────────────
function init() {
  nodes = RAW.nodes;
  links = RAW.links;
  nodeMap = {};
  nodes.forEach(n => nodeMap[n.id] = n);

  // Build adjacency
  nodes.forEach(n => { n.neighbors = []; n.edges = []; });
  links.forEach(l => {
    const s = nodeMap[l.source], t = nodeMap[l.target];
    if (s && t) {
      s.neighbors.push(t.id); s.edges.push(l);
      t.neighbors.push(s.id); t.edges.push(l);
    }
  });

  // Init positions — community-clustered seed
  const commCenters = {};
  const commCounts = {};
  nodes.forEach(n => {
    commCounts[n.community] = (commCounts[n.community] || 0) + 1;
  });
  const comms = Object.keys(commCounts).map(Number);
  const numC = comms.length;
  comms.forEach((c, i) => {
    const angle = (i / numC) * Math.PI * 2;
    const r = Math.min(canvas.width, canvas.height) * 0.32;
    commCenters[c] = { x: Math.cos(angle) * r, y: Math.sin(angle) * r };
  });
  nodes.forEach(n => {
    const cc = commCenters[n.community] || { x: 0, y: 0 };
    positions[n.id] = {
      x: cc.x + (Math.random() - 0.5) * 180,
      y: cc.y + (Math.random() - 0.5) * 180,
    };
    velocities[n.id] = { x: 0, y: 0 };
  });

  updateStats();
  buildCommunityFilters();
  buildRelationFilters();
  requestAnimationFrame(loop);
}

function visibleNodes() {
  return nodes.filter(n =>
    !hiddenCommunities.has(n.community) &&
    (!searchTerm || n.label.toLowerCase().includes(searchTerm))
  );
}

function visibleLinks() {
  const vis = new Set(visibleNodes().map(n => n.id));
  return links.filter(l =>
    vis.has(l.source) && vis.has(l.target) &&
    !hiddenRelations.has(l.relation)
  );
}

// ── Force-directed layout ───────────────────────────────────
function runSim() {
  if (!simRunning) return;
  simStep++;
  if (simStep > 300) { simRunning = false; document.getElementById('loading').style.display = 'none'; return; }
  if (simStep === 80) document.getElementById('loading').style.display = 'none';

  const vn = new Set(visibleNodes().map(n => n.id));
  const alpha = Math.max(0.01, 0.3 * Math.exp(-simStep * 0.018));
  const repulse = 1800;
  const attract = 0.012;
  const center = 0.003;

  // Reset forces
  nodes.forEach(n => { velocities[n.id].x = 0; velocities[n.id].y = 0; });

  // Repulsion (Barnes-Hut approx: just do O(n^2) for small sets, skip hidden)
  const vNodes = nodes.filter(n => vn.has(n.id));
  for (let i = 0; i < vNodes.length; i++) {
    for (let j = i + 1; j < vNodes.length; j++) {
      const a = vNodes[i], b = vNodes[j];
      const dx = positions[b.id].x - positions[a.id].x;
      const dy = positions[b.id].y - positions[a.id].y;
      const d2 = dx * dx + dy * dy + 1;
      const d = Math.sqrt(d2);
      const f = repulse / d2;
      const fx = (dx / d) * f, fy = (dy / d) * f;
      velocities[a.id].x -= fx; velocities[a.id].y -= fy;
      velocities[b.id].x += fx; velocities[b.id].y += fy;
    }
  }

  // Attraction along links
  visibleLinks().forEach(l => {
    const s = positions[l.source], t = positions[l.target];
    if (!s || !t) return;
    const dx = t.x - s.x, dy = t.y - s.y;
    const d = Math.sqrt(dx * dx + dy * dy) + 0.01;
    const f = (d - 80) * attract;
    const fx = (dx / d) * f, fy = (dy / d) * f;
    velocities[l.source].x += fx; velocities[l.source].y += fy;
    velocities[l.target].x -= fx; velocities[l.target].y -= fy;
  });

  // Centering
  vNodes.forEach(n => {
    velocities[n.id].x -= positions[n.id].x * center;
    velocities[n.id].y -= positions[n.id].y * center;
  });

  // Community clustering pull
  const ccX = {}, ccY = {}, ccN = {};
  vNodes.forEach(n => {
    ccX[n.community] = (ccX[n.community] || 0) + positions[n.id].x;
    ccY[n.community] = (ccY[n.community] || 0) + positions[n.id].y;
    ccN[n.community] = (ccN[n.community] || 0) + 1;
  });
  vNodes.forEach(n => {
    const cx = ccX[n.community] / ccN[n.community];
    const cy = ccY[n.community] / ccN[n.community];
    velocities[n.id].x += (cx - positions[n.id].x) * 0.004;
    velocities[n.id].y += (cy - positions[n.id].y) * 0.004;
  });

  // Integrate
  const damping = 0.82;
  vNodes.forEach(n => {
    velocities[n.id].x *= damping;
    velocities[n.id].y *= damping;
    positions[n.id].x += velocities[n.id].x * alpha;
    positions[n.id].y += velocities[n.id].y * alpha;
  });
}

// ── Render ──────────────────────────────────────────────────
function nodeRadius(n) {
  return Math.max(4, Math.min(20, 3 + Math.sqrt(n.degree) * 2.2));
}

function render() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const vn = new Set(visibleNodes().map(n => n.id));
  const vLinks = visibleLinks();

  ctx.save();
  ctx.translate(W / 2 + viewX, H / 2 + viewY);
  ctx.scale(viewScale, viewScale);

  // Draw edges
  vLinks.forEach(l => {
    const s = positions[l.source], t = positions[l.target];
    if (!s || !t) return;
    const isHighlighted = highlightSet && (highlightSet.has(l.source) && highlightSet.has(l.target));
    const alpha = highlightSet ? (isHighlighted ? 0.85 : 0.04) : 0.25;
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(t.x, t.y);
    ctx.strokeStyle = relColor(l.relation);
    ctx.globalAlpha = alpha;
    ctx.lineWidth = isHighlighted ? 1.8 / viewScale : 0.8 / viewScale;
    ctx.stroke();
  });
  ctx.globalAlpha = 1;

  // Draw nodes
  const vNodesList = nodes.filter(n => vn.has(n.id));
  vNodesList.forEach(n => {
    const pos = positions[n.id];
    if (!pos) return;
    const r = nodeRadius(n) / viewScale * 0.9 + nodeRadius(n) * (1 - 1 / viewScale);
    const rad = nodeRadius(n);
    const color = commColor(n.community);
    const isSelected = selectedNode && selectedNode.id === n.id;
    const isHighlighted = highlightSet ? highlightSet.has(n.id) : true;
    const isHovered = hoveredNode && hoveredNode.id === n.id;

    ctx.globalAlpha = isHighlighted ? 1 : 0.15;

    // Glow for selected/hovered
    if (isSelected || isHovered) {
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, rad * 2.2, 0, Math.PI * 2);
      const grd = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, rad * 2.2);
      grd.addColorStop(0, color + '44');
      grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.fill();
    }

    ctx.beginPath();
    ctx.arc(pos.x, pos.y, rad, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();

    if (isSelected) {
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2 / viewScale;
      ctx.stroke();
    }

    // Labels
    if (showLabels && (viewScale > 0.6 || rad > 10 || isSelected || isHovered)) {
      const label = n.label.replace(/\.dart$/, '').replace(/package:liquid_soap_tracker\//, '').replace(/package:flutter\//, 'flutter/').replace(/package:flutter_riverpod\//, 'riverpod/');
      ctx.font = `${Math.max(9, 10 / viewScale)}px -apple-system, sans-serif`;
      ctx.fillStyle = isSelected ? '#ffffff' : (isHighlighted ? '#c9d1d9' : '#8b949e');
      ctx.textAlign = 'center';
      ctx.fillText(label.length > 22 ? label.slice(-22) : label, pos.x, pos.y + rad + 11 / viewScale);
    }
    ctx.globalAlpha = 1;
  });

  ctx.restore();
}

function loop() {
  runSim();
  render();
  requestAnimationFrame(loop);
}

// ── Interaction ─────────────────────────────────────────────
function canvasToWorld(cx, cy) {
  const rect = canvas.getBoundingClientRect();
  const W = canvas.width, H = canvas.height;
  return {
    x: (cx - rect.left - W / 2 - viewX) / viewScale,
    y: (cy - rect.top - H / 2 - viewY) / viewScale,
  };
}

function hitTest(worldX, worldY) {
  const vn = new Set(visibleNodes().map(n => n.id));
  let best = null, bestD = Infinity;
  nodes.forEach(n => {
    if (!vn.has(n.id)) return;
    const pos = positions[n.id];
    const dx = pos.x - worldX, dy = pos.y - worldY;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d < nodeRadius(n) * 2 && d < bestD) { best = n; bestD = d; }
  });
  return best;
}

canvas.addEventListener('mousedown', e => {
  dragging = true;
  dragStartX = e.clientX; dragStartY = e.clientY;
  dragViewX = viewX; dragViewY = viewY;
});

canvas.addEventListener('mousemove', e => {
  if (dragging) {
    viewX = dragViewX + (e.clientX - dragStartX);
    viewY = dragViewY + (e.clientY - dragStartY);
    return;
  }
  const w = canvasToWorld(e.clientX, e.clientY);
  const n = hitTest(w.x, w.y);
  hoveredNode = n;
  if (n) {
    tooltip.className = 'show';
    tooltip.innerHTML = `
      <div class="t-label">${n.label}</div>
      <div class="t-community">Cluster: ${COMMUNITY_NAMES[n.community] || 'Community ' + n.community}</div>
      <div class="t-degree">${n.degree} connections</div>
      <div class="t-file">${n.source_file || ''}</div>
    `;
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
  } else {
    tooltip.className = '';
  }
});

canvas.addEventListener('mouseup', e => {
  if (Math.abs(e.clientX - dragStartX) < 4 && Math.abs(e.clientY - dragStartY) < 4) {
    const w = canvasToWorld(e.clientX, e.clientY);
    const n = hitTest(w.x, w.y);
    selectNode(n);
  }
  dragging = false;
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.12 : 0.89;
  viewScale = Math.max(0.05, Math.min(8, viewScale * factor));
}, { passive: false });

function selectNode(n) {
  selectedNode = n;
  if (n) {
    highlightSet = new Set([n.id, ...n.neighbors]);
    renderNodePanel(n);
  } else {
    highlightSet = null;
    document.getElementById('node-info').innerHTML = '<span style="color:#484f58">Click a node to inspect it</span>';
  }
}

function renderNodePanel(n) {
  const outEdges = links.filter(l => l.source === n.id);
  const inEdges = links.filter(l => l.target === n.id);
  const nbrs = [...new Set([...outEdges.map(l => l.target), ...inEdges.map(l => l.source)])];
  const nbHtml = nbrs.slice(0, 20).map(id => {
    const nb = nodeMap[id];
    if (!nb) return '';
    const rel = (outEdges.find(l => l.target === id) || inEdges.find(l => l.source === id) || {}).relation || '';
    return `<div class="neighbor-item" onclick="jumpTo('${id}')">${nb.label.replace(/\.dart$/,'')} <span class="neighbor-rel">${rel}</span></div>`;
  }).join('');

  document.getElementById('node-info').innerHTML = `
    <div class="info-row"><div class="info-label">Label</div><div class="info-val">${n.label}</div></div>
    <div class="info-row"><div class="info-label">Community</div><div class="info-val" style="color:${commColor(n.community)}">${COMMUNITY_NAMES[n.community] || 'Community ' + n.community}</div></div>
    <div class="info-row"><div class="info-label">Connections</div><div class="info-val" style="color:#58a6ff">${n.degree}</div></div>
    <div class="info-row"><div class="info-label">File</div><div class="info-val" style="font-size:10px;color:#484f58">${n.source_file || '—'}</div></div>
    <div class="info-row"><div class="info-label">Neighbors (${Math.min(nbrs.length, 20)}/${nbrs.length})</div>
    <div style="margin-top:4px">${nbHtml}</div></div>
  `;
}

function jumpTo(id) {
  const n = nodeMap[id];
  if (!n) return;
  selectNode(n);
  // Pan to node
  const pos = positions[id];
  if (pos) {
    viewX = -pos.x * viewScale;
    viewY = -pos.y * viewScale;
  }
}

// ── Controls ─────────────────────────────────────────────────
document.getElementById('zoom-in').onclick = () => viewScale = Math.min(8, viewScale * 1.3);
document.getElementById('zoom-out').onclick = () => viewScale = Math.max(0.05, viewScale / 1.3);
document.getElementById('zoom-fit').onclick = fitView;
document.getElementById('toggle-labels').onclick = () => { showLabels = !showLabels; };

function fitView() {
  const vn = visibleNodes();
  if (!vn.length) return;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  vn.forEach(n => {
    const p = positions[n.id];
    if (p) { minX = Math.min(minX, p.x); minY = Math.min(minY, p.y); maxX = Math.max(maxX, p.x); maxY = Math.max(maxY, p.y); }
  });
  const W = canvas.width, H = canvas.height;
  const s = Math.min(W / (maxX - minX + 100), H / (maxY - minY + 100), 2) * 0.85;
  viewScale = s;
  viewX = -((minX + maxX) / 2) * s;
  viewY = -((minY + maxY) / 2) * s;
}

// ── Search ───────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase().trim();
  simRunning = true; simStep = 0;
  if (searchTerm) {
    const match = nodes.find(n => n.label.toLowerCase().includes(searchTerm));
    if (match) highlightSet = new Set([match.id, ...match.neighbors]);
  } else {
    highlightSet = null;
  }
});

// ── Community filters ────────────────────────────────────────
function buildCommunityFilters() {
  const comms = [...new Set(nodes.map(n => n.community))].sort((a, b) => a - b).slice(0, 18);
  const el = document.getElementById('community-filters');
  el.innerHTML = comms.map(c => `
    <label class="filter-item">
      <input type="checkbox" checked data-community="${c}" onchange="toggleComm(${c}, this.checked)">
      <div class="filter-dot" style="background:${commColor(c)}"></div>
      ${(COMMUNITY_NAMES[c] || 'Community ' + c).substring(0, 22)}
    </label>
  `).join('');
}

function toggleComm(c, checked) {
  if (checked) hiddenCommunities.delete(c); else hiddenCommunities.add(c);
  simRunning = true; simStep = 0;
}

// ── Relation filters ─────────────────────────────────────────
function buildRelationFilters() {
  const rels = [...new Set(links.map(l => l.relation))];
  const el = document.getElementById('rel-filters');
  el.innerHTML = rels.map(r => `
    <label class="filter-item">
      <input type="checkbox" checked data-relation="${r}" onchange="toggleRel('${r}', this.checked)">
      <div class="filter-dot" style="background:${relColor(r)}"></div>
      ${r}
    </label>
  `).join('');
}

function toggleRel(r, checked) {
  if (checked) hiddenRelations.delete(r); else hiddenRelations.add(r);
}

// ── Stats ────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('s-nodes').textContent = nodes.length;
  document.getElementById('s-edges').textContent = links.length;
  document.getElementById('s-comm').textContent = new Set(nodes.map(n => n.community)).size;
}

// ── Resize ───────────────────────────────────────────────────
function resize() {
  const area = document.getElementById('canvas-area');
  canvas.width = area.clientWidth;
  canvas.height = area.clientHeight;
}
window.addEventListener('resize', resize);
resize();

init();
</script>
</body>
